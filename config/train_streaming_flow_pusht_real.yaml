# ==========================================================
# Streaming Flow Policy on real PushT (data: 480x640) + lowdim eef_pose
# Benchmark aligned with benchmark_bfn_pusht_real
# ==========================================================

defaults:
  - _self_

_target_: workspaces.train_streaming_flow_workspace.TrainStreamingFlowWorkspace

name: benchmark_streaming_flow_pusht_real_image_480x640_20hz
exp_name: bfn_vs_diffusion
output_root: ${oc.env:BFN_OUTPUT_ROOT,/ariesdv0/zhaoyang/BFN_outputs}
dataset_root: ${oc.env:BFN_DATA_ROOT,/ariesdv0/zhaoyang/BFN_data}

# ================== Horizons ==================
horizon: 16
n_obs_steps: 2
n_action_steps: 8

# ================== Shared Task Params ==================
# Your collected data resolution (C,H,W)
image_shape: [3, 480, 480]
crop_shape: [384, 384]
# Generated by formalize_data.py with --target-hz 20
dataset_path: ${dataset_root}/pusht_real

# ================== Shape Meta ==================
shape_meta:
  action:
    shape: [7]
  obs:
    camera_0:
      shape: ${image_shape}
      type: rgb
    camera_1:
      shape: ${image_shape}
      type: rgb
    # robot_eef_pose:
    #   # Dataset stores eef pose as 6D (xyz + rot), while action is 7D.
    #   shape: [6]
    #   type: low_dim

# ================== Policy ==================
policy:
  _target_: policies.streaming_flow_policy.StreamingFlowPolicy
  action_space: null  # Will be set by workspace
  shape_meta: ${shape_meta}
  horizon: ${horizon}
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  
  # Streaming Flow Policy specific parameters
  sigma0: 0.1  # Initial Gaussian tube standard deviation (equivalent to BFN sigma_1)
  trajectories: null  # Will be loaded from demonstrations
  prior: null  # Will be computed from demonstrations
  
  # Vision encoder config (match BFN preprocessing crop)
  crop_shape: ${crop_shape}
  obs_encoder_group_norm: true
  eval_fixed_crop: true
  
  # Device and dtype
  device: cuda
  dtype: float32
  clip_actions: true

# ================== EMA ==================
ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

# ================== Optimizer ==================
optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-5 
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 5.0e-5

# ================== Training (Setup only) ==================
training:
  device: cuda
  seed: 42
  debug: false
  resume: false
  # Training parameters (Streaming Flow Policy does require training for velocity network)
  lr_scheduler: cosine
  lr_warmup_steps: 300  # Streaming Flow Policy uses 500 warmup steps
  num_epochs: 100
  gradient_accumulate_every: 1
  rollout_every: 1
  checkpoint_every: 1
  val_every: 1
  sample_every: 1
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0
  use_ema: true

# ================== Dataloader ==================
dataloader:
  batch_size: 64
  shuffle: true
  num_workers: 8
  pin_memory: true
  persistent_workers: false

val_dataloader:
  batch_size: 64
  shuffle: false
  num_workers: 8
  pin_memory: true
  persistent_workers: false

# ================== Task ==================
task:
  name: pusht_real_image
  image_shape: ${image_shape}
  shape_meta: ${shape_meta}

  dataset:
    _target_: diffusion_policy.dataset.real_pusht_image_dataset.RealPushTImageDataset
    shape_meta: ${shape_meta}
    dataset_path: ${dataset_path}
    horizon: ${horizon}
    pad_before: ${eval:'${n_obs_steps}-1'}
    pad_after: ${eval:'${n_action_steps}-1'}
    n_obs_steps: ${n_obs_steps}
    use_cache: true
    seed: 42
    val_ratio: 0.03
    max_train_episodes: null

  # Environment runner for evaluation (optional)
  env_runner: null

# ================== Checkpoint ==================
checkpoint:
  topk:
    monitor_key: val_loss
    mode: min
    k: 1
    format_str: epoch={epoch:04d}-val_loss={val_loss:.3f}.ckpt
  save_last_ckpt: false
  save_last_snapshot: false

# ================== Logging ==================
logging:
  project: pusht_bfn_vs_diffusion
  resume: true
  mode: online
  name: ${now:%Y.%m.%d-%H.%M.%S}_streaming_flow_real_image_seed${training.seed}
  tags:
    - benchmark
    - pusht_real
    - streaming_flow_policy
    - demonstration_based
    - image_lowdim
    - res_480x640
    - seed_${training.seed}
  id: null
  group: bfn_vs_diffusion_benchmark

# ================== Hydra ==================
hydra:
  run:
    dir: "${output_root}/${now:%Y.%m.%d}/${now:%H.%M.%S}_streaming_flow_real_image_seed${training.seed}"
  sweep:
    dir: outputs/benchmark/${now:%Y-%m-%d}
    subdir: streaming_flow_real_image_seed${training.seed}
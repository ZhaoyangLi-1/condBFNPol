defaults:
  - _self_

_target_: workspaces.train_streaming_flow_workspace.TrainStreamingFlowWorkspace

name: benchmark_streaming_flow_pusht_real_image_480x640
exp_name: bfn_vs_diffusion
output_root: ${oc.env:BFN_OUTPUT_ROOT,/ariesdv0/zhaoyang/BFN_outputs}
dataset_root: ${oc.env:BFN_DATA_ROOT,/ariesdv0/zhaoyang/BFN_data}

horizon: 16
n_obs_steps: 2
n_action_steps: 8

image_shape: [3, 480, 640]
crop_shape: [384, 512]
dataset_path: ${dataset_root}/pusht_real_sfp_xy

shape_meta:
  action:
    shape: [7]
  obs:
    camera_0:
      shape: ${image_shape}
      type: rgb
    camera_1:
      shape: ${image_shape}
      type: rgb
    # If you add low-dim pose / gripper observations, set them here and
    # update policy.initial_action_keys so inference starts from the current EE state.

policy:
  _target_: policies.streaming_flow_unet_hybrid_image_policy.StreamingFlowUnetHybridImagePolicy
  shape_meta: ${shape_meta}
  horizon: ${horizon}
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  flow_mode: stochastic
  sigma0: 0.1
  sigma1: 0.5
  integration_steps_per_action: 6
  initial_action_mode: zeros
  initial_action_keys: null
  crop_shape: ${crop_shape}
  obs_encoder_group_norm: true
  eval_fixed_crop: true
  diffusion_step_embed_dim: 256
  down_dims: [256, 512, 1024]
  kernel_size: 5
  n_groups: 8

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-5
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 5.0e-5

training:
  device: cuda
  seed: 42
  debug: false
  resume: false
  lr_scheduler: cosine
  lr_warmup_steps: 300
  num_epochs: 100
  gradient_accumulate_every: 1
  rollout_every: 1
  checkpoint_every: 1
  val_every: 1
  sample_every: 1
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0
  use_ema: true

dataloader:
  batch_size: 64
  shuffle: true
  num_workers: 8
  pin_memory: true
  persistent_workers: false

val_dataloader:
  batch_size: 64
  shuffle: false
  num_workers: 8
  pin_memory: true
  persistent_workers: false

task:
  name: pusht_real_image
  image_shape: ${image_shape}
  shape_meta: ${shape_meta}

  dataset:
    _target_: diffusion_policy.dataset.real_pusht_image_dataset.RealPushTImageDataset
    shape_meta: ${shape_meta}
    dataset_path: ${dataset_path}
    horizon: ${horizon}
    pad_before: ${eval:'${n_obs_steps}-1'}
    pad_after: ${eval:'${n_action_steps}-1'}
    n_obs_steps: ${n_obs_steps}
    use_cache: true
    seed: 42
    val_ratio: 0.03
    max_train_episodes: null

  env_runner: null

checkpoint:
  topk:
    monitor_key: val_loss
    mode: min
    k: 1
    format_str: epoch={epoch:04d}-val_loss={val_loss:.3f}.ckpt
  save_last_ckpt: false
  save_last_snapshot: false

logging:
  project: bfn-project
  resume: true
  mode: online
  name: ${now:%Y.%m.%d-%H.%M.%S}_streaming_flow_pusht_real_seed${training.seed}
  tags:
    - benchmark
    - pusht_real
    - streaming_flow
    - image
    - seed_${training.seed}
  id: null
  group: bfn-project

hydra:
  run:
    dir: "${output_root}/${now:%Y.%m.%d}/${now:%H.%M.%S}_streaming_flow_pusht_real_seed${training.seed}"
  sweep:
    dir: outputs/benchmark/${now:%Y-%m-%d}
    subdir: streaming_flow_pusht_real_seed${training.seed}
